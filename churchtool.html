<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work Studio | Pro</title>
    <style>
        :root {
            --accent: #00d084;
            --accent-dark: #008f5a;
            --ink: #0f172a;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #1e293b;
            --text-h: #0f172a;
            --text-p: #64748b;
            --grid: rgba(15, 23, 42, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--grid) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-p);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .app-header {
            background: var(--ink);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 2000;
            border-bottom: 3px solid var(--accent);
        }

        .brand {
            font-weight: 900;
            font-size: 18px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand span { color: var(--accent); }

        .menu-trigger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .menu-trigger span {
            display: block;
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: var(--ink);
            z-index: 3001;
            transition: right 0.3s ease;
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
            color: white;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { right: 0; }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 3000;
        }

        .batch-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .batch-item:active { background: rgba(255,255,255,0.1); }
        .batch-title { font-weight: 700; font-size: 14px; color: var(--accent); }
        .batch-count { font-size: 10px; opacity: 0.6; }

        .app-container {
            max-width: 400px; 
            margin: 0 auto;
            padding: 24px 16px 60px 16px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            margin: 24px 0 10px 4px;
            color: var(--ink);
        }

        .quick-tpl-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding: 4px 0;
            scrollbar-width: none;
        }
        .quick-tpl-bar::-webkit-scrollbar { display: none; }

        .tpl-chip {
            background: var(--ink);
            border: 2px solid var(--border);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
            cursor: pointer;
            color: white;
            box-shadow: 3px 3px 0px var(--border);
        }

        .card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            box-shadow: 6px 6px 0px var(--border);
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--ink);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.4;
            font-weight: 500;
        }

        .btn-main {
            background: var(--ink);
            color: white;
            border: 2px solid var(--ink);
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0px #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0px #000; }

        .btn-save {
            background: #fff;
            color: var(--ink);
            margin-top: 10px;
            font-size: 12px;
            padding: 10px;
            box-shadow: 0 3px 0px var(--border);
        }

        .batch-actions {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        .btn-start { flex: 1; }
        .btn-add-batch {
            width: 52px;
            background: var(--accent);
            border-color: var(--ink);
            color: var(--ink);
            box-shadow: 0 4px 0px var(--ink);
            font-size: 22px;
            padding: 0;
        }

        .list-row {
            background: white;
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            box-shadow: 3px 3px 0px var(--border);
        }

        .list-row.active { border-color: var(--accent); box-shadow: 3px 3px 0px var(--accent); }

        .info b { display: block; color: var(--ink); font-size: 16px; font-weight: 800; }
        .info span { font-size: 10px; font-weight: 800; text-transform: uppercase; }

        .btn-send {
            background: var(--accent);
            color: var(--ink);
            border: 2px solid var(--border);
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 12px;
            text-decoration: none;
            text-align: center;
        }

        .btn-send.done { background: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; pointer-events: none; }

        .progress-integrated {
            background: var(--ink);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 4px 4px 0px var(--border);
            display: none; 
            position: relative;
        }

        .prog-header-inner { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-right: 30px; }

        .btn-close-list {
            position: absolute;
            top: 10px; right: 12px;
            background: #ef4444; color: white; border: 2px solid #991b1b;
            width: 24px; height: 24px; border-radius: 6px; font-weight: 900; font-size: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 0px #7f1d1d;
        }

        .prog-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8); display: none;
            justify-content: center; align-items: center; z-index: 4000; padding: 20px;
        }
        .modal-card {
            background: white; border: 3px solid var(--border); border-radius: 20px;
            padding: 24px; width: 100%; max-width: 320px; box-shadow: 8px 8px 0px var(--border);
        }
        .modal-card h3 { color: var(--ink); margin: 0 0 10px 0; font-weight: 900; }
        .modal-card p { font-size: 14px; margin-bottom: 20px; color: var(--text-p); }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--border); font-weight: 800; font-size: 12px; text-transform: uppercase; cursor: pointer; }
        .modal-confirm { background: #ef4444; color: white; border-color: #991b1b; }
        .modal-cancel { background: #f1f5f9; color: var(--ink); }

        .reset-link { display: block; text-align: center; margin-top: 40px; font-size: 10px; font-weight: 800; color: #ef4444; text-transform: uppercase; cursor: pointer; padding: 10px; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span style="font-weight: 900; color: var(--accent);">BATCH LIST</span>
        <button onclick="toggleMenu()" style="background: none; border: none; color: white; font-size: 20px;">✕</button>
    </div>
    <div class="sidebar-content">
        <div id="batchList"></div>
        <p style="font-size: 11px; opacity: 0.5; text-align: center; margin-top: 20px;">Saved batches will appear here.</p>
    </div>
</div>

<div class="app-header">
    <div class="brand">STUDIO <span>PRO</span></div>
    <button class="menu-trigger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button>
</div>

<div class="app-container">
    <div class="section-label">1. WRITE YOUR MESSAGE</div>
    <div id="tplBar" class="quick-tpl-bar"></div>
    
    <div class="card">
        <textarea id="msgInput" rows="4" placeholder="Type the message you want to send here..." oninput="syncState()"></textarea>
        <div style="display:flex; gap:10px;">
            <button class="btn-main btn-save" onclick="handleSaveTpl()">+ Save Template</button>
            <button class="btn-main btn-save" style="color:#ef4444;" onclick="handleClearText()">Clear Text</button>
        </div>
    </div>

    <div class="section-label">2. PASTE PHONE NUMBERS</div>
    <div class="card">
        <textarea id="numInput" rows="5" placeholder="Paste numbers (e.g. 080123... or 234801...)" oninput="syncState()"></textarea>
        <div class="batch-actions">
            <button class="btn-main btn-start" onclick="handleGenerate()">Start Sending Batch</button>
            <button class="btn-main btn-add-batch" onclick="handleSaveBatch()" title="Save Current Batch">+</button>
        </div>
    </div>

    <div id="integratedProgress" class="progress-integrated">
        <button class="btn-close-list" onclick="confirmDismiss()">✕</button>
        <div class="prog-header-inner">
            <div style="font-weight: 900; font-size: 14px;" id="percText">0%</div>
            <div style="font-size: 10px; font-weight: 800; opacity: 0.8;" id="statLabel">0 OF 0 COMPLETED</div>
        </div>
        <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>

    <div id="workList"></div>

    <div class="reset-link" onclick="confirmReset()">Reset History & Progress</div>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
        <h3 id="modalTitle">Are you sure?</h3>
        <p id="modalBody">This action cannot be undone.</p>
        <div class="modal-actions">
            <button class="modal-btn modal-cancel" onclick="closeModal()">Cancel</button>
            <button id="modalConfirmBtn" class="modal-btn modal-confirm">Yes, Do it</button>
        </div>
    </div>
</div>

<script>
    let state = {
        msg: localStorage.getItem('pro_msg') || '',
        nums: localStorage.getItem('pro_nums') || '',
        sent: JSON.parse(localStorage.getItem('pro_sent') || '[]'),
        tpls: JSON.parse(localStorage.getItem('pro_tpls') || '{}'),
        batches: JSON.parse(localStorage.getItem('pro_batches') || '{}')
    };

    window.onload = () => {
        document.getElementById('msgInput').value = state.msg;
        document.getElementById('numInput').value = state.nums;
        refreshTplBar();
        refreshBatchList();
        if(state.nums) handleGenerate();
    };

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const isOpen = sidebar.classList.toggle('open');
        overlay.style.display = isOpen ? 'block' : 'none';
    }

    function showModal(title, body, onConfirm) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = body;
        const confirmBtn = document.getElementById('modalConfirmBtn');
        confirmBtn.onclick = () => { onConfirm(); closeModal(); };
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function refreshTplBar() {
        const bar = document.getElementById('tplBar');
        bar.innerHTML = '';
        const keys = Object.keys(state.tpls);
        if (keys.length === 0) return bar.style.display = 'none';
        bar.style.display = 'flex';
        keys.forEach(name => {
            const chip = document.createElement('div');
            chip.className = 'tpl-chip';
            chip.innerText = name;
            chip.onclick = () => { 
                document.getElementById('msgInput').value = state.tpls[name]; 
                syncState(); 
            };
            bar.appendChild(chip);
        });
    }

    function refreshBatchList() {
        const list = document.getElementById('batchList');
        list.innerHTML = '';
        const keys = Object.keys(state.batches);
        keys.forEach(name => {
            const div = document.createElement('div');
            div.className = 'batch-item';
            div.innerHTML = `
                <div>
                    <div class="batch-title">${name}</div>
                    <div class="batch-count">${state.batches[name].split(/[\n,]/).filter(x => x.trim()).length} Numbers</div>
                </div>
                <button onclick="deleteBatch(event, '${name}')" style="background:none; border:none; color:#ef4444; font-weight:900;">✕</button>
            `;
            div.onclick = () => {
                document.getElementById('numInput').value = state.batches[name];
                syncState();
                handleGenerate();
                toggleMenu();
            };
            list.appendChild(div);
        });
    }

    function handleSaveTpl() {
        const txt = document.getElementById('msgInput').value.trim();
        if(!txt) return;
        const name = prompt("Template name:");
        if(!name) return;
        state.tpls[name] = txt;
        localStorage.setItem('pro_tpls', JSON.stringify(state.tpls));
        refreshTplBar();
    }

    function handleSaveBatch() {
        const txt = document.getElementById('numInput').value.trim();
        if(!txt) return;
        const name = prompt("Enter a title for this batch:");
        if(!name) return;
        state.batches[name] = txt;
        localStorage.setItem('pro_batches', JSON.stringify(state.batches));
        refreshBatchList();
    }

    function deleteBatch(e, name) {
        e.stopPropagation();
        if(confirm(`Delete batch "${name}"?`)) {
            delete state.batches[name];
            localStorage.setItem('pro_batches', JSON.stringify(state.batches));
            refreshBatchList();
        }
    }

    function syncState() {
        state.msg = document.getElementById('msgInput').value;
        state.nums = document.getElementById('numInput').value;
        localStorage.setItem('pro_msg', state.msg);
        localStorage.setItem('pro_nums', state.nums);
    }

    function formatNumber(raw) {
        let cleaned = raw.trim().replace(/[^0-9]/g, '');
        if (!cleaned) return null;
        if (cleaned.startsWith('0') && cleaned.length === 11) return '234' + cleaned.substring(1);
        return cleaned;
    }

    function handleClearText() { 
        document.getElementById('msgInput').value = ''; 
        syncState(); 
    }

    function confirmDismiss() {
        showModal("Close List?", "Buttons will hide, but numbers stay in the box.", dismissList);
    }

    function dismissList() {
        document.getElementById('workList').innerHTML = '';
        document.getElementById('integratedProgress').style.display = 'none';
        // When dismissing the list, we also clear the number input area and the saved memory for it
        document.getElementById('numInput').value = '';
        syncState();
    }

    function handleGenerate() {
        syncState();
        const rawInput = state.nums.split(/[,\n]/);
        const processedNumbers = rawInput.map(n => formatNumber(n)).filter(n => n !== null && n.length > 5);
        const container = document.getElementById('workList');
        const progBar = document.getElementById('integratedProgress');

        if (processedNumbers.length === 0) return dismissList();

        progBar.style.display = 'block';
        container.innerHTML = `<div class="section-label">3. TAP SEND FOR EACH NUMBER</div>`;
        processedNumbers.forEach((num) => {
            const isDone = state.sent.includes(num);
            const row = document.createElement('div');
            row.className = `list-row ${!isDone ? 'active' : ''}`;
            row.innerHTML = `
                <div class="info"><b>+${num}</b><span>${isDone ? 'Sent' : 'Ready'}</span></div>
                <a href="https://wa.me/${num}?text=${encodeURIComponent(state.msg)}" target="_blank" class="btn-send ${isDone ? 'done' : ''}" onclick="markAsSent('${num}')">${isDone ? 'SENT' : 'SEND'}</a>
            `;
            container.appendChild(row);
        });
        updateProgress(processedNumbers);
    }

    function markAsSent(num) {
        if(!state.sent.includes(num)) {
            state.sent.push(num);
            localStorage.setItem('pro_sent', JSON.stringify(state.sent));
            setTimeout(() => handleGenerate(), 500);
        }
    }

    function updateProgress(list) {
        const done = state.sent.filter(n => list.includes(n)).length;
        const p = list.length > 0 ? Math.round((done/list.length)*100) : 0;
        document.getElementById('progFill').style.width = p + '%';
        document.getElementById('percText').innerText = p + '%';
        document.getElementById('statLabel').innerText = `${done} OF ${list.length} COMPLETED`;
    }

    function confirmReset() { showModal("Reset Progress?", "This clears sent history and progress bar.", () => { localStorage.removeItem('pro_sent'); state.sent = []; handleGenerate(); }); }
</script>
</body>
</html>
