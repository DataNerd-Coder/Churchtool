<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHURCH STUDIO PRO | WATCHMAN</title>
    <!-- Tailwind for the new header structure -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* SWITCHING & NAV LOGIC */
        .studio-view { display: none; }
        .studio-view.active { display: block; }
        
        .floating-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            z-index: 9999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px solid #1e293b;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Nav Hide State */
        .nav-hidden {
            transform: translateX(-50%) translateY(100px);
            opacity: 0;
        }

        /* Header Hide State */
        .header-hidden {
            transform: translateY(-100%);
        }

        .floating-nav .nav-btn {
            background: transparent;
            border: none;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .floating-nav .nav-btn.active {
            background: #1e293b;
            color: #00d084;
        }

        /* --- VCF STUDIO ORIGINAL STYLES (STRICTLY PRESERVED) --- */
        #view-vcf {
            --accent: #00d084;
            --ink: #0f172a;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #1e293b;
            --text-p: #64748b;
        }
        #view-vcf .app-container { max-width: 450px; margin: 0 auto; padding: 24px 16px 80px 16px; }
        #view-vcf .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; margin: 24px 0 10px 4px; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        #view-vcf .section-label::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #00d084; border-radius: 2px; }
        #view-vcf .card { background: #ffffff; border: 2px solid #1e293b; border-radius: 16px; padding: 18px; box-shadow: 6px 6px 0px #1e293b; margin-bottom: 24px; }
        #view-vcf input[type="text"], #view-vcf textarea { width: 100%; background: #f1f5f9; border: 2px solid #1e293b; color: #0f172a; font-size: 14px; padding: 12px; border-radius: 10px; outline: none; box-sizing: border-box; font-weight: 600; }
        #view-vcf .btn-main { background: #0f172a; color: white; border: 2px solid #0f172a; width: 100%; padding: 16px; border-radius: 14px; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0px #000; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        #view-vcf .btn-secondary { background: white; color: #ef4444; border-color: #1e293b; box-shadow: 0 4px 0px #1e293b; margin-top: 12px; }
        #view-vcf .status-box { display: none; padding: 14px; border: 2px solid #1e293b; border-radius: 12px; font-weight: 800; font-size: 13px; margin-bottom: 20px; text-align: center; box-shadow: 3px 3px 0px #1e293b; }
        #view-vcf .status-success { background: #dcfce7; color: #166534; border-color: #166534; }
        #view-vcf .status-error { background: #fee2e2; color: #991b1b; border-color: #991b1b; }
        #view-vcf .toggle-row { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 0; }
        #view-vcf .toggle-box { width: 20px; height: 20px; border: 2px solid #1e293b; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: white; }
        #view-vcf input[type="checkbox"]:checked + .toggle-box { background: #00d084; border-color: #0f172a; }
        #view-vcf input[type="checkbox"]:checked + .toggle-box::after { content: '✓'; color: #0f172a; font-size: 14px; font-weight: 900; }

        /* --- SENDER ORIGINAL STYLES (STRICTLY PRESERVED) --- */
        #view-sender {
            --accent: #00d084;
            --ink: #0f172a;
            --bg: #f8fafc;
            --border: #1e293b;
        }
        #view-sender .app-container { max-width: 400px; margin: 0 auto; padding: 24px 16px 100px 16px; }
        #view-sender .card { background: white; border: 2px solid #1e293b; border-radius: 16px; padding: 14px 18px; box-shadow: 6px 6px 0px #1e293b; margin-bottom: 24px; }
        .btn-main {
            background: var(--ink);
            color: white;
            border: 2px solid var(--ink);
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0px #000;
            display: flex;
            align-items: center; justify-content: center;
            box-sizing: border-box;
        }

        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0px #000; }

        .btn-save {
            background: #fff;
            color: var(--ink);
            margin-top: 10px;
            font-size: 12px;
            padding: 10px;
            box-shadow: 0 3px 0px var(--border);
        }

        .batch-actions {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        .btn-start { flex: 1; }
        .btn-add-batch {
            width: 52px;
            background: var(--accent);
            border-color: var(--ink);
            color: var(--ink);
            box-shadow: 0 4px 0px var(--ink);
            font-size: 22px;
            padding: 0;
        }
        
        .list-row {
            background: white;
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            box-shadow: 3px 3px 0px var(--border);
        }

        .list-row.active { border-color: var(--accent); box-shadow: 3px 3px 0px var(--accent); }

        .info b { display: block; color: var(--ink); font-size: 16px; font-weight: 800; }
        .info span { font-size: 10px; font-weight: 800; text-transform: uppercase; }
        
        .btn-send {
            background: var(--accent);
            color: var(--ink);
            border: 2px solid var(--border);
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 12px;
            text-decoration: none;
            text-align: center;
        }

        .btn-send.done { background: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; pointer-events: none; }
        .btn-send.wait { background: #e2e8f0; color: #64748b; border-color: #cbd5e1; pointer-events: none; }

        .progress-integrated {
            background: var(--ink);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 4px 4px 0px var(--border);
            display: none; 
            position: relative;
        }

        .prog-header-inner { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-right: 30px; }

        .btn-close-list {
            position: absolute;
            top: 10px; right: 12px;
            background: #ef4444; color: white; border: 2px solid #991b1b;
            width: 24px; height: 24px; border-radius: 6px; font-weight: 900; font-size: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 0px #7f1d1d;
        }

        .prog-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8); display: none;
            justify-content: center; align-items: center; z-index: 4000; padding: 20px;
        }
        .modal-card {
            background: white; border: 3px solid var(--border); border-radius: 20px;
            padding: 24px; width: 100%; max-width: 320px; box-shadow: 8px 8px 0px var(--border);
        }
        .modal-card h3 { color: var(--ink); margin: 0 0 10px 0; font-weight: 900; }
        .modal-card p { font-size: 14px; margin-bottom: 20px; color: var(--text-p); }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--border); font-weight: 800; font-size: 12px; text-transform: uppercase; cursor: pointer; }
        .modal-confirm { background: #ef4444; color: white; border-color: #991b1b; }
        .modal-cancel { background: #f1f5f9; color: var(--ink); }

        .reset-link { display: block; text-align: center; margin-top: 40px; font-size: 10px; font-weight: 800; color: #ef4444; text-transform: uppercase; cursor: pointer; padding: 10px; }
        
        #view-sender .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #0f172a; z-index: 3001; transition: right 0.3s ease; color: white; }
        #view-sender .sidebar.open { right: 0; }
        .hidden { display: none; }

        /* REFINED HAMBURGER ANIMATION */
        .ham-bar {
            height: 2.5px;
            background-color: white;
            border-radius: 10px;
            transition: 0.3s;
        }

        #mainHeader {
            transition: transform 0.3s ease;
        }

        /* NEW TEMPLATE DELETE STYLE */
        .tpl-chip {
            background:#0f172a; 
            color:white; 
            padding:8px 12px; 
            border-radius:12px; 
            font-size:12px; 
            font-weight:800; 
            cursor:pointer; 
            white-space:nowrap; 
            border:2px solid #1e293b; 
            box-shadow:3px 3px 0px #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-del-tpl {
            background: #ef4444;
            color: white;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
            border: 1px solid #991b1b;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc; background-image: radial-gradient(rgba(15, 23, 42, 0.05) 1px, transparent 1px); background-size: 24px 24px; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;">

<!-- NEW BEAUTIFUL STICKY HEADER -->
<header id="mainHeader" class="sticky top-0 bg-[#0f172a] text-white p-4 border-b-4 border-[#00d084] z-[2000]">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    
    <!-- Branding -->
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-[#00d084] rounded-lg flex items-center justify-center">
          <span class="text-[#0f172a] font-black text-xl">W</span>
      </div>
      <div>
        <h1 class="font-black text-xl md:text-2xl tracking-tight leading-none">
          CHURCH <span class="text-[#00d084]">STUDIO</span>
        </h1>
        <p class="text-slate-400 text-[10px] mt-0.5 uppercase tracking-wider font-bold">Watchman UNN</p>
      </div>
    </div>

    <!-- Right Actions -->
    <div class="flex items-center gap-4">
      <div id="menuContainer">
          <button onclick="toggleMenu()" class="flex flex-col gap-[5px] cursor-pointer group p-2 hover:bg-white/5 rounded-lg transition-colors">
              <span class="ham-bar w-6"></span>
              <span class="ham-bar w-4 self-end"></span>
              <span class="ham-bar w-6"></span>
          </button>
      </div>
    </div>
  </div>
  <!-- Decorative Background Glow -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(0,208,132,0.05),transparent)] pointer-events-none"></div>
</header>

<!-- FLOATING NAV -->
<div id="floatingNav" class="floating-nav">
    <button onclick="switchView('sender')" id="navBtn-sender" class="nav-btn active">
        <svg style="width:16px;height:16px;" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        Sender
    </button>
    <button onclick="switchView('vcf')" id="navBtn-vcf" class="nav-btn">
        <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        Contacts
    </button>
</div>

<!-- 1. SENDER VIEW -->
<div id="view-sender" class="studio-view active">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; z-index: 3000;"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 900; color: #00d084;">BATCH LIST</span>
            <button onclick="toggleMenu()" style="background: none; border: none; color: white; font-size: 20px;">✕</button>
        </div>
        <div style="padding: 20px; overflow-y: auto; flex: 1;">
            <div id="batchList"></div>
            <p style="font-size: 11px; opacity: 0.5; text-align: center; margin-top: 20px;">Saved batches will appear here.</p>
        </div>
    </div>

    <div class="app-container">
        <div style="font-size:11px; text-transform:uppercase; letter-spacing:1.5px; font-weight:800; margin:24px 0 10px 4px; color:#0f172a;">1. WRITE YOUR MESSAGE</div>
        <div style="font-size:10px; opacity:0.6; margin-bottom:8px; padding-left:4px;">Use: (name), (greeting), (time), (day)</div>
        <div id="tplBar" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:12px; padding:4px 0; scrollbar-width: none;"></div>
        <div class="card">
            <textarea id="msgInput" rows="4" placeholder="Type the message you want to send here..." oninput="syncState()" style="width:100%; border:none; outline:none; font-size:15px; font-family: inherit; font-weight: 500;"></textarea>
            <div style="display:flex; gap:10px;">
            <button class="btn-main btn-save" onclick="handleSaveTpl()">+ Save Template</button>
            <button class="btn-main btn-save" style="color:#ef4444;" onclick="handleClearText()">Clear Text</button>
        </div>
        </div>

        <div style="font-size:11px; text-transform:uppercase; letter-spacing:1.5px; font-weight:800; margin:24px 0 10px 4px; color:#0f172a;">2. INPUT NUMBERS OR UPLOAD</div>
        <div class="card">
            <textarea id="numInput" rows="5" placeholder="Paste numbers (e.g. 080123... or 234801...) or upload a file" oninput="syncState()" style="width:100%; border:none; outline:none; font-size:15px; font-family: inherit; font-weight: 500;"></textarea>
           
           <div style="margin: 10px 0;">
                <input type="file" id="filePicker" accept=".vcf,.csv,.xlsx,.xls" class="hidden" onchange="handleFileUpload(event)">
                <button class="btn-main btn-save" style="width:100%; border-style: dashed; border-width: 2px;" onclick="document.getElementById('filePicker').click()">
                    📎 Upload VCF / CSV / Excel
                </button>
           </div>

           <div class="batch-actions">
            <button class="btn-main btn-start" onclick="handleGenerate()">Start Sending Batch</button>
            <button class="btn-main btn-add-batch" onclick="handleSaveBatch()" title="Save Current Batch">+</button>
            </div>
        </div>

         <div id="integratedProgress" class="progress-integrated">
        <button class="btn-close-list" onclick="confirmDismiss()">✕</button>
        <div class="prog-header-inner">
            <div style="font-weight: 900; font-size: 14px;" id="percText">0%</div>
            <div style="font-size: 10px; font-weight: 800; opacity: 0.8;" id="statLabel">0 OF 0 COMPLETED</div>
        </div>
        <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>
    
        <div id="workList"></div>
        <div class="reset-link" onclick="confirmReset()">Reset History & Progress</div>
    </div>
    <div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
        <h3 id="modalTitle">Are you sure?</h3>
        <p id="modalBody">This action cannot be undone.</p>
        <div class="modal-actions">
            <button class="modal-btn modal-cancel" onclick="closeModal()">Cancel</button>
            <button id="modalConfirmBtn" class="modal-btn modal-confirm">Yes, Do it</button>
        </div>
    </div>
</div>
    
</div>


<!-- 2. VCF STUDIO VIEW -->
<div id="view-vcf" class="studio-view">
    <div class="app-container">
        <div id="statusBox" class="status-box"></div>
        <div class="section-label">1. Configuration</div>
        <div class="card">
            <div style="margin-bottom:15px;">
                <label style="font-size:10px; font-weight:900; color:#64748b; text-transform:uppercase; display: block; margin-bottom: 6px;">Naming Prefix</label>
                <input type="text" id="namePrefix" placeholder="Default: Contact">
            </div>
            <label class="toggle-row">
                <input type="checkbox" id="skipHeader" checked class="hidden">
                <div class="toggle-box"></div>
                <span style="font-size: 13px; font-weight: 800; color: #0f172a;">Skip header row</span>
            </label>
        </div>
        <div class="section-label">2. Input Data</div>
        <div class="card">
            <label style="font-size:10px; font-weight:900; color:#64748b; text-transform:uppercase; margin-bottom:6px; display:block;">Paste Numbers or CSV</label>
            <textarea id="inputData" rows="8" placeholder="Phone Number, Name..."></textarea>
        </div>
        <div class="section-label">3. Actions</div>
        <div style="padding: 0 4px;">
            <button class="btn-main" onclick="generateVCF()">Generate & Download VCF</button>
            <button class="btn-main btn-secondary" onclick="clearAll()">Clear Everything</button>
        </div>
    </div>
</div>

<script>
    /* SCROLL BEHAVIOR FOR NAV */
    let lastScrollTop = 0;
    const header = document.getElementById('mainHeader');
    const floatingNav = document.getElementById('floatingNav');
    let cooldownEnd = 0; // Global cooldown timestamp

    window.addEventListener('scroll', function() {
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        
        if (scrollTop > lastScrollTop && scrollTop > 50) {
            header.classList.add('header-hidden');
            floatingNav.classList.add('nav-hidden');
        } else {
            header.classList.remove('header-hidden');
            floatingNav.classList.remove('nav-hidden');
        }
        lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
    }, false);

    function switchView(view) {
        document.querySelectorAll('.studio-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        document.getElementById('navBtn-' + view).classList.add('active');
        
        const menu = document.getElementById('menuContainer');
        if (view === 'sender') {
            menu.style.visibility = 'visible';
        } else {
            menu.style.visibility = 'hidden'; 
        }
        window.scrollTo(0,0);
    }

    /* --- SENDER LOGIC --- */
    let state = {
        msg: localStorage.getItem('pro_msg') || '',
        nums: localStorage.getItem('pro_nums') || '',
        sent: JSON.parse(localStorage.getItem('pro_sent') || '[]'),
        tpls: JSON.parse(localStorage.getItem('pro_tpls') || '{}'),
        batches: JSON.parse(localStorage.getItem('pro_batches') || '{}')
    };

    window.onload = () => {
        document.getElementById('msgInput').value = state.msg;
        document.getElementById('numInput').value = state.nums;
        refreshTplBar();
        refreshBatchList();
        if(state.nums) handleGenerate();
    };

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const isOpen = sidebar.classList.toggle('open');
        overlay.style.display = isOpen ? 'block' : 'none';
    }

    function showModal(title, body, onConfirm) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = body;
        const confirmBtn = document.getElementById('modalConfirmBtn');
        confirmBtn.onclick = () => { onConfirm(); closeModal(); };
        document.getElementById('modalOverlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    /* --- CUSTOMIZATION LOGIC --- */
    function getPersonalizedMessage(baseMsg, name) {
        const now = new Date();
        const hrs = now.getHours();
        let greeting = "Good morning";
        if (hrs >= 12) greeting = "Good afternoon";
        if (hrs >= 17) greeting = "Good evening";
        
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const day = dayNames[now.getDay()];
        const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        return baseMsg
            .replace(/\(name\)/gi, name || "there")
            .replace(/\(greeting\)/gi, greeting)
            .replace(/\(time\)/gi, time)
            .replace(/\(day\)/gi, day);
    }

    /* --- FILE UPLOAD LOGIC --- */
    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        const ext = file.name.split('.').pop().toLowerCase();

        reader.onload = function(e) {
            let results = [];
            if (ext === 'vcf') {
                const content = e.target.result;
                const vcards = content.split('BEGIN:VCARD');
                vcards.forEach(card => {
                    const fn = card.match(/FN:(.*)/)?.[1];
                    const tel = card.match(/TEL.*:(.*)/)?.[1];
                    if (tel) results.push(tel.trim() + (fn ? `, ${fn.trim()}` : ""));
                });
            } else if (ext === 'xlsx' || ext === 'xls') {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                rows.forEach(row => {
                    if (row[0]) results.push(row[0] + (row[1] ? `, ${row[1]}` : ""));
                });
            } else if (ext === 'csv') {
                const content = e.target.result;
                const lines = content.split('\n');
                lines.forEach(line => {
                    if (line.trim()) results.push(line.trim());
                });
            }
            
            if (results.length > 0) {
                document.getElementById('numInput').value = results.join('\n');
                syncState();
                handleGenerate();
            }
        };

        if (ext === 'xlsx' || ext === 'xls') {
            reader.readAsArrayBuffer(file);
        } else {
            reader.readAsText(file);
        }
    }

    function refreshTplBar() {
        const bar = document.getElementById('tplBar');
        bar.innerHTML = '';
        const keys = Object.keys(state.tpls);
        if (keys.length === 0) return bar.style.display = 'none';
        bar.style.display = 'flex';
        keys.forEach(name => {
            const chip = document.createElement('div');
            chip.className = 'tpl-chip';
            
            // Text Content
            const textSpan = document.createElement('span');
            textSpan.innerText = name;
            textSpan.onclick = () => { document.getElementById('msgInput').value = state.tpls[name]; syncState(); };
            
            // Delete Button
            const delBtn = document.createElement('button');
            delBtn.className = 'btn-del-tpl';
            delBtn.innerText = '✕';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                if(confirm(`Delete template "${name}"?`)) {
                    delete state.tpls[name];
                    localStorage.setItem('pro_tpls', JSON.stringify(state.tpls));
                    refreshTplBar();
                }
            };
            
            chip.appendChild(textSpan);
            chip.appendChild(delBtn);
            bar.appendChild(chip);
        });
    }

    function refreshBatchList() {
        const list = document.getElementById('batchList');
        list.innerHTML = '';
        Object.keys(state.batches).forEach(name => {
            const div = document.createElement('div');
            div.style = "background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;";
            div.innerHTML = `<div><div style="font-weight:700; font-size: 14px; color:#00d084;">${name}</div></div><button onclick="deleteBatch(event, '${name}')" style="background:none; border:none; color:#ef4444; font-weight:900;">✕</button>`;
            div.onclick = () => { document.getElementById('numInput').value = state.batches[name]; syncState(); handleGenerate(); toggleMenu(); };
            list.appendChild(div);
        });
    }

    function handleSaveTpl() {
        const txt = document.getElementById('msgInput').value.trim();
        if(!txt) return;
        const name = prompt("Template name:");
        if(name) { state.tpls[name] = txt; localStorage.setItem('pro_tpls', JSON.stringify(state.tpls)); refreshTplBar(); }
    }

    function handleSaveBatch() {
        const txt = document.getElementById('numInput').value.trim();
        if(!txt) return;
        const name = prompt("Batch title:");
        if(name) { state.batches[name] = txt; localStorage.setItem('pro_batches', JSON.stringify(state.batches)); refreshBatchList(); }
    }

    function deleteBatch(e, n) {
        e.stopPropagation();
        if(confirm(`Delete batch "${n}"?`)) { delete state.batches[n]; localStorage.setItem('pro_batches', JSON.stringify(state.batches)); refreshBatchList(); }
    }

    function syncState() {
        state.msg = document.getElementById('msgInput').value;
        state.nums = document.getElementById('numInput').value;
        localStorage.setItem('pro_msg', state.msg);
        localStorage.setItem('pro_nums', state.nums);
    }

    function handleClearText() { document.getElementById('msgInput').value = ''; syncState(); }
    function confirmDismiss() { showModal("Close List?", "Buttons will hide, but numbers stay in the box.", dismissList); }
    function dismissList() { document.getElementById('workList').innerHTML = ''; document.getElementById('integratedProgress').style.display = 'none'; document.getElementById('numInput').value = ''; syncState(); }

    function handleGenerate() {
        syncState();
        const container = document.getElementById('workList');
        const lines = state.nums.split('\n').filter(l => l.trim());
        
        let validEntries = [];
        lines.forEach(line => {
            let [numPart, namePart] = line.split(',').map(s => s?.trim());
            if (!numPart) return;
            let c = numPart.replace(/\D/g, '');
            if(c.startsWith('0') && c.length === 11) c = '234' + c.slice(1);
            if(c.length >= 7) {
                validEntries.push({ num: c, name: namePart || '' });
            }
        });

        if(!validEntries.length) return dismissList();

        document.getElementById('integratedProgress').style.display = 'block';
        container.innerHTML = `<div style="font-size:11px; text-transform:uppercase; letter-spacing:1.5px; font-weight:800; margin:24px 0 10px 4px; color:#0f172a;">3. TAP SEND FOR EACH NUMBER</div>`;
        
        const isCooldownActive = validEntries.length > 10 && Date.now() < cooldownEnd;

        validEntries.forEach(entry => {
            const isDone = state.sent.includes(entry.num);
            const customizedMsg = getPersonalizedMessage(state.msg, entry.name);
            const row = document.createElement('div');
            row.className = 'list-row';
            
            const btnClass = isDone ? 'done' : (isCooldownActive ? 'wait' : '');
            const btnText = isDone ? 'SENT' : (isCooldownActive ? 'WAIT' : 'SEND');

            row.innerHTML = `<div class="info"><b>+${entry.num}</b><span style="font-size: 10px; font-weight: 800; text-transform: uppercase;">${entry.name ? entry.name + ' • ' : ''}${isDone?'Sent':'Ready'}</span></div>
                             <a href="https://wa.me/${entry.num}?text=${encodeURIComponent(customizedMsg)}" target="_blank" class="btn-send ${btnClass}" onclick="markAsSent('${entry.num}', ${validEntries.length})">${btnText}</a>`;
            container.appendChild(row);
        });

        const done = state.sent.filter(n => validEntries.some(e => e.num === n)).length;
        const p = Math.round((done/validEntries.length)*100);
        document.getElementById('progFill').style.width = p+'%';
        document.getElementById('percText').innerText = p+'%';
        document.getElementById('statLabel').innerText = `${done} OF ${validEntries.length} COMPLETED`;

        if (isCooldownActive) {
            startCooldownTimer();
        }
    }

    function startCooldownTimer() {
        const updateTimer = () => {
            const now = Date.now();
            if (now < cooldownEnd) {
                const remaining = Math.ceil((cooldownEnd - now) / 1000);
                document.querySelectorAll('.btn-send.wait').forEach(btn => {
                    btn.innerText = `WAIT ${remaining}s`;
                });
                setTimeout(updateTimer, 1000);
            } else {
                handleGenerate(); // Refresh UI to enable buttons
            }
        };
        updateTimer();
    }

    function markAsSent(num, batchSize) { 
        if(!state.sent.includes(num)) { 
            state.sent.push(num); 
            localStorage.setItem('pro_sent', JSON.stringify(state.sent)); 
            
            // Set cooldown if batch > 10
            if (batchSize > 10) {
                cooldownEnd = Date.now() + 5000;
            }

            setTimeout(handleGenerate, 500); 
        } 
    }
    
    function confirmReset() { showModal("Reset Progress?", "This clears sent history.", () => { localStorage.removeItem('pro_sent'); state.sent = []; handleGenerate(); }); }

    /* --- VCF LOGIC --- */
    function formatVCFPhone(phone) {
        phone = phone.replace(/\D/g, '');
        if (!phone) return null;
        if (phone.startsWith("0") && phone.length === 11) return "234" + phone.slice(1);
        if (phone.startsWith("234")) return phone;
        if (phone.startsWith("7") || phone.startsWith("8") || phone.startsWith("9")) return "234" + phone;
        return phone;
    }
    function showVCFStatus(msg, type) {
        const box = document.getElementById('statusBox');
        box.innerText = msg; box.style.display = 'block'; box.className = 'status-box ' + (type === 'success' ? 'status-success' : 'status-error');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function generateVCF() {
        const input = document.getElementById('inputData').value.trim();
        const prefix = document.getElementById('namePrefix').value.trim() || "Contact";
        const skip = document.getElementById('skipHeader').checked;
        if (!input) { showVCFStatus("Error: No data!", "error"); return; }
        let lines = input.split('\n'); let unique = new Set(); let vcf = ""; let count = 0;
        lines.forEach((line, index) => {
            line = line.trim(); if (!line) return;
            if (index === 0 && skip) { if (/[a-zA-Z]/.test(line) && !/\d{5,}/.test(line)) return; }
            let phone, name;
            if (line.includes(",")) { let parts = line.split(","); phone = formatVCFPhone(parts[0]); name = parts[1] ? parts[1].trim() : prefix + " " + (count + 1); }
            else { phone = formatVCFPhone(line); name = prefix + " " + (count + 1); }
            if (phone && !unique.has(phone) && phone.length >= 7) {
                unique.add(phone); vcf += "BEGIN:VCARD\nVERSION:3.0\nFN:" + name + "\nTEL;TYPE=CELL:+" + phone + "\nEND:VCARD\n"; count++;
            }
        });
        if (count === 0) { showVCFStatus("Error: No valid numbers.", "error"); return; }
        const blob = new Blob([vcf], { type: "text/vcard" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = "VCF_Studio_" + count + ".vcf"; a.click();
        showVCFStatus("Success: " + count + " contacts generated!", "success");
    }
    function clearAll() { document.getElementById('inputData').value = ''; document.getElementById('statusBox').style.display = 'none'; document.getElementById('namePrefix').value = ''; }
</script>
